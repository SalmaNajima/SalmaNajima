<!DOCTYPE html>
<html>
<head>
    <title>Menu Tugas</title>
    <style>
        body {
            text-align: center;
            margin-top: 80px;
            font-family: Arial, sans-serif;
        }
        
        h2 {
            font-size: 32px;
            margin-bottom: 40px;
        }

        button {
            font-size: 24px;        /* Membuat tulisan di button lebih besar */
            padding: 15px 30px;     /* Memberi ruang dalam button agar terlihat lebih besar */
            margin: 15px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background-color: #007bff;
            color: white;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <h2>Menu Tugas</h2>
    
    <a href="https://salmanajima.github.io/Salma.Najima/">
        <button>Tugas 1</button>
    </a>
    
    <a href="https://salmanajima.github.io/Salma-Najima/">
        <button>Tugas 2</button>
    </a>
</body>
</html>
